<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Book — Project Plans</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --navy: #1C2E44; --cream: #FAFAF8; --muted: #7A7670; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--cream); }
  body {
    font-family: 'DM Sans', sans-serif;
    color: #1A1A18;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 40px 20px;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    text-align: center; max-width: 420px;
  }
  .brand {
    font-family: 'Libre Baskerville', serif;
    font-size: 24px; font-weight: 700;
    color: var(--navy); margin-bottom: 12px;
  }
  .sub {
    font-size: 14px; color: var(--muted); line-height: 1.6;
  }
  .sub a { color: var(--navy); text-decoration: none; font-weight: 500; }
  .sub a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">Open Book</div>
    <div class="sub">
      This site hosts client project plans.<br>
      Visit your project URL directly to view your dashboard.<br><br>
      <a href="https://teamopenbook.com">teamopenbook.com</a>
    </div>
  </div>
</body>
</html>
